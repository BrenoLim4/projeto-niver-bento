<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle da TV - Fazendinha do Bento</title>
  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <style>
    /* ── Modo switcher ───────────────────────────────────── */
    .modo-atual {
      font-size: 0.85rem;
      color: var(--cor-texto-secundario);
      margin-bottom: var(--espaco-sm);
    }
    .modo-atual strong {
      color: var(--cor-texto);
    }

    .grade-modos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--espaco-sm);
      margin-bottom: var(--espaco-lg);
    }

    .btn-modo {
      padding: var(--espaco-sm) var(--espaco-md);
      border: 2px solid var(--cor-bege);
      border-radius: var(--raio-md);
      background: var(--cor-superficie);
      color: var(--cor-texto);
      font-family: var(--fonte-texto);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      text-align: center;
    }

    .btn-modo:hover {
      border-color: var(--cor-dourado);
    }

    .btn-modo--ativo {
      background: var(--cor-dourado);
      border-color: var(--cor-dourado);
      color: #fff;
    }

    /* ── Secao titulo ────────────────────────────────────── */
    .secao-titulo {
      font-family: var(--fonte-titulo);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--cor-texto);
      margin: var(--espaco-xl) 0 var(--espaco-sm);
      padding-bottom: var(--espaco-xs);
      border-bottom: 2px solid var(--cor-bege);
    }

    /* ── Desafios Visuais ────────────────────────────────── */
    .desafio-rapido-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--espaco-sm);
      margin-bottom: var(--espaco-sm);
    }

    .grade-respostas {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--espaco-xs);
      margin-top: var(--espaco-sm);
    }

    .btn-resposta {
      padding: var(--espaco-sm);
      border: 2px solid var(--cor-bege);
      border-radius: var(--raio-md);
      background: var(--cor-superficie);
      color: var(--cor-texto);
      font-family: var(--fonte-texto);
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
    }

    .btn-resposta:hover:not(:disabled) {
      border-color: var(--cor-dourado);
      background: #FFFBF0;
    }

    .btn-resposta:disabled { opacity: 0.5; cursor: default; }
    .btn-resposta--correta   { border-color: var(--cor-verde)!important;   background: #E8F5E9!important; }
    .btn-resposta--incorreto { border-color: var(--cor-vermelho)!important; background: #FDECEA!important; }

    .desafio-status-bloco {
      font-size: 0.85rem;
      color: var(--cor-texto-secundario);
      margin-bottom: var(--espaco-xs);
    }

    /* ── Tesouro status ──────────────────────────────────── */
    .tesouro-bloco {
      display: flex;
      align-items: center;
      gap: var(--espaco-md);
      background: var(--cor-superficie);
      border: 2px solid var(--cor-dourado);
      border-radius: var(--raio-lg);
      padding: var(--espaco-md);
      box-shadow: var(--sombra-suave);
      margin-bottom: var(--espaco-md);
    }

    .tesouro-bloco--encontrado {
      border-color: var(--cor-verde);
      box-shadow: var(--sombra-forte), 0 0 20px rgba(111, 140, 82, 0.3);
    }

    .tesouro-icone {
      font-size: 2.4rem;
      flex-shrink: 0;
    }

    .tesouro-info {
      flex: 1;
    }

    .tesouro-info strong {
      display: block;
      font-family: var(--fonte-titulo);
      font-size: 1rem;
      margin-bottom: 2px;
    }

    .tesouro-status-texto {
      font-size: 0.9rem;
    }

    .tesouro-status-texto--encontrado {
      color: var(--cor-verde);
      font-weight: 700;
    }

    .tesouro-status-texto--nao-encontrado {
      color: var(--cor-texto-secundario);
    }

    /* ── Erro / Toast ────────────────────────────────────── */
    .msg-erro {
      color: var(--cor-vermelho);
      font-weight: 600;
      font-size: 0.9rem;
      margin: var(--espaco-sm) 0 0;
    }

    .toast-sucesso {
      position: fixed;
      bottom: var(--espaco-xl);
      left: 50%;
      transform: translateX(-50%);
      background: var(--cor-verde);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: var(--espaco-sm) var(--espaco-xl);
      border-radius: var(--raio-lg);
      box-shadow: var(--sombra-forte);
      z-index: 100;
      white-space: nowrap;
      animation: toast-subir 0.3s ease-out;
    }

    @keyframes toast-subir {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="texto-centro">
      <h1>📺 Controle da TV</h1>
      <p><a href="/dashboard/">← Voltar ao Dashboard</a></p>
    </div>

    <!-- ── Modo da TV ──────────────────────────────────────── -->
    <p class="modo-atual">Modo atual: <strong id="label-modo-atual">carregando…</strong></p>

    <div class="grade-modos">
      <button class="btn-modo" data-modo="hall_da_fama">🏆 Painel dos Campeões</button>
      <button class="btn-modo" data-modo="corrida_animais">🚜 Corrida</button>
      <button class="btn-modo" data-modo="pescaria">🎣 Pescaria</button>
      <button class="btn-modo" data-modo="roleta_fazenda">🎡 Roleta</button>
      <button class="btn-modo" data-modo="estatisticas">📊 Estatísticas</button>
      <button class="btn-modo" data-modo="caca_tesouro">🗺️ Caça ao Tesouro</button>
      <button class="btn-modo" data-modo="caca_tesouro_qr" style="grid-column: 1 / -1;">📲 QR Cadastro — Caça ao Tesouro</button>
      <button class="btn-modo" data-modo="galeria_fotos" style="grid-column: 1 / -1;">📷 Mural de Fotos e Vídeos</button>
    </div>

    <!-- ── Desafios Visuais ──────────────────────────────────── -->
    <p class="secao-titulo">🎯 Desafios Visuais</p>

    <div class="desafio-rapido-grid">
      <input id="input-desafio-participante" type="text" class="campo-inline"
             placeholder="Nome do participante" autocomplete="off"
             style="padding: var(--espaco-sm) var(--espaco-md); border: 2px solid var(--cor-bege); border-radius: var(--raio-md); font-family: var(--fonte-texto); font-size: 0.9rem; background: var(--cor-superficie);" />
      <button id="btn-lancar-desafio" class="botao botao-primario">🎯 Lançar</button>
    </div>

    <select id="select-premio-tv"
            style="width:100%; padding: var(--espaco-sm) var(--espaco-md); border: 2px solid var(--cor-bege); border-radius: var(--raio-md); font-family: var(--fonte-texto); font-size: 0.88rem; background: var(--cor-superficie); color: var(--cor-texto); margin-bottom: var(--espaco-sm);">
      <option value="">🏅 Sem prêmio</option>
    </select>

    <div id="desafio-painel" style="display: none; margin-bottom: var(--espaco-md);">
      <div id="desafio-status-bloco" class="desafio-status-bloco"></div>
      <div id="grade-respostas" class="grade-respostas" style="display: none;">
        <button class="btn-resposta" data-letra="A" id="ctrl-alt-a"><strong>A</strong> — <span id="ctrl-texto-a"></span></button>
        <button class="btn-resposta" data-letra="B" id="ctrl-alt-b"><strong>B</strong> — <span id="ctrl-texto-b"></span></button>
        <button class="btn-resposta" data-letra="C" id="ctrl-alt-c"><strong>C</strong> — <span id="ctrl-texto-c"></span></button>
        <button class="btn-resposta" data-letra="D" id="ctrl-alt-d"><strong>D</strong> — <span id="ctrl-texto-d"></span></button>
      </div>
    </div>

    <p style="font-size: 0.82rem; color: var(--cor-texto-secundario); margin-bottom: var(--espaco-lg);">
      <a href="/dashboard/desafios.html">📋 Ver histórico completo →</a>
    </p>

    <!-- ── Tesouro da Fazenda ─────────────────────────────── -->
    <p class="secao-titulo">🏆 Tesouro da Fazenda</p>

    <div class="tesouro-bloco" id="tesouro-bloco">
      <span class="tesouro-icone">🏆</span>
      <div class="tesouro-info">
        <strong>Tesouro da Fazenda</strong>
        <span class="tesouro-status-texto" id="tesouro-status-texto">carregando…</span>
      </div>
    </div>

    <button id="btn-liberar-tesouro" class="botao botao-primario botao-bloco" style="display: none;">
      🔓 Liberar Tesouro da Fazenda
    </button>
  </div>

  <!-- Modal: Confirmar Tesouro -->
  <div id="modal-tesouro" class="modal-fundo" style="display: none;">
    <div class="modal">
      <h3 class="modal-titulo">🏆 Liberar Tesouro da Fazenda</h3>
      <p>Quem encontrou o Tesouro da Fazenda?</p>
      <div class="campo">
        <label for="input-vencedor-tesouro">Nome do ganhador *</label>
        <input id="input-vencedor-tesouro" type="text" placeholder="Ex: Ana" autocomplete="off" />
      </div>
      <p id="erro-tesouro" class="msg-erro" style="display: none;"></p>
      <div class="flex gap-sm" style="margin-top: var(--espaco-md);">
        <button id="btn-cancelar-tesouro" class="botao botao-secundario botao-bloco">Cancelar</button>
        <button id="btn-confirmar-tesouro" class="botao botao-sucesso botao-bloco">Confirmar 🎉</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../js/supabaseClient.js';
    import { buscarConfigAtual, subscribeConfig, criarCanalBroadcast, subscribeDesafiosTentativas } from '../js/realtime.js';

    const LABELS_MODO = {
      hall_da_fama:     'Painel dos Campeões',
      corrida_animais:  'Corrida dos Tratores',
      pescaria:         'Pescaria',
      roleta_fazenda:   'Roleta da Fazenda',
      estatisticas:     'Estatísticas',
      caca_tesouro:     'Caça ao Tesouro',
      caca_tesouro_qr:  'Caça ao Tesouro — QR Cadastro',
      galeria_fotos:    'Mural de Fotos e Vídeos',
    };

    const labelModoAtual       = document.getElementById('label-modo-atual');
    const btnsModo             = document.querySelectorAll('.btn-modo');
    const tesouroBloco         = document.getElementById('tesouro-bloco');
    const tesouroStatusTexto   = document.getElementById('tesouro-status-texto');
    const btnLiberarTesouro    = document.getElementById('btn-liberar-tesouro');
    const modalTesouro         = document.getElementById('modal-tesouro');
    const inputVencedorTesouro = document.getElementById('input-vencedor-tesouro');
    const erroTesouro          = document.getElementById('erro-tesouro');
    const btnCancelarTesouro   = document.getElementById('btn-cancelar-tesouro');
    const btnConfirmarTesouro  = document.getElementById('btn-confirmar-tesouro');

    let modoAtual    = null;
    let processando  = false;
    let toastTimeout = null;
    const canalBroadcast = criarCanalBroadcast();

    // ── Desafios Visuais ─────────────────────────────────────────
    let desafioAtivo       = null;
    let charadaAtiva       = null;
    let desafioProcessando = false;
    let premiosTv          = [];
    let premioSelecionadoTv = null;

    const inputDesafioParticipante = document.getElementById('input-desafio-participante');
    const btnLancarDesafio         = document.getElementById('btn-lancar-desafio');
    const desafioPainel            = document.getElementById('desafio-painel');
    const desafioStatusBloco       = document.getElementById('desafio-status-bloco');
    const gradeRespostas           = document.getElementById('grade-respostas');
    const selectPremioTv           = document.getElementById('select-premio-tv');

    // ── Config: modo + tesouro ───────────────────────────────────

    async function carregarConfig() {
      try {
        const config = await buscarConfigAtual();
        aplicarModoUI(config.modo_apresentacao);
        aplicarTesouroUI(config.tesouro_status);
      } catch {
        labelModoAtual.textContent = 'erro ao carregar';
      }
    }

    function aplicarModoUI(modo) {
      modoAtual = modo;
      labelModoAtual.textContent = LABELS_MODO[modo] ?? modo;
      btnsModo.forEach((btn) => {
        btn.classList.toggle('btn-modo--ativo', btn.dataset.modo === modo);
      });
    }

    function aplicarTesouroUI(status) {
      const encontrado = status === 'encontrado';
      tesouroBloco.classList.toggle('tesouro-bloco--encontrado', encontrado);
      tesouroStatusTexto.textContent = encontrado ? '✅ Encontrado!' : 'Ainda não encontrado';
      tesouroStatusTexto.className = 'tesouro-status-texto ' +
        (encontrado ? 'tesouro-status-texto--encontrado' : 'tesouro-status-texto--nao-encontrado');
      btnLiberarTesouro.style.display = encontrado ? 'none' : '';
    }

    // ── Trocar modo da TV ────────────────────────────────────────

    btnsModo.forEach((btn) => {
      btn.addEventListener('click', async () => {
        const modo = btn.dataset.modo;
        if (modo === modoAtual) return;

        btn.disabled = true;
        try {
          const { error } = await supabase
            .from('config')
            .update({ modo_apresentacao: modo })
            .eq('id', 1);

          if (error) throw error;
          aplicarModoUI(modo);
          mostrarToast(`TV → ${LABELS_MODO[modo] ?? modo}`);
        } catch (err) {
          mostrarToast(`⚠️ ${err.message}`);
        } finally {
          btn.disabled = false;
        }
      });
    });

    // ── Tesouro: abre modal ──────────────────────────────────────

    btnLiberarTesouro.addEventListener('click', () => {
      inputVencedorTesouro.value = '';
      erroTesouro.style.display = 'none';
      modalTesouro.style.display = 'flex';
      setTimeout(() => inputVencedorTesouro.focus(), 50);
    });

    btnCancelarTesouro.addEventListener('click', () => {
      modalTesouro.style.display = 'none';
    });

    inputVencedorTesouro.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnConfirmarTesouro.click();
    });

    // ── Tesouro: confirma e envia para a TV ──────────────────────

    btnConfirmarTesouro.addEventListener('click', async () => {
      const nome = inputVencedorTesouro.value.trim();
      if (!nome) { mostrarErro('Digite o nome do ganhador.'); return; }
      if (processando) return;

      processando = true;
      btnConfirmarTesouro.disabled = true;
      btnConfirmarTesouro.textContent = '⏳ Processando...';
      erroTesouro.style.display = 'none';

      try {
        const { data: tesouro, error: tErr } = await supabase
          .from('premios')
          .select('*')
          .eq('is_tesouro', true)
          .single();

        if (tErr || !tesouro) throw new Error('Tesouro da Fazenda não encontrado no banco de dados.');
        if (tesouro.status === 'entregue')  throw new Error('O Tesouro da Fazenda já foi entregue!');
        if (tesouro.status === 'reservado') throw new Error('O Tesouro da Fazenda já está reservado para outro ganhador.');

        const { data: evento, error: evErr } = await supabase
          .from('eventos')
          .insert({
            tipo: 'livre',
            premio_id: tesouro.id,
            premio_codigo: tesouro.codigo,
            premio_nome: tesouro.nome,
            premio_imagem_url: tesouro.imagem_url,
            premio_categoria: tesouro.categoria,
            vencedor: nome,
            status: 'pending',
            metadata: { is_tesouro: true },
          })
          .select()
          .single();

        if (evErr) throw evErr;

        await supabase.from('premios').update({ status: 'reservado' }).eq('id', tesouro.id);

        await canalBroadcast.aguardarPronto();
        const resultado = await canalBroadcast.send({
          type: 'broadcast',
          event: 'novo_evento',
          payload: evento,
        });

        modalTesouro.style.display = 'none';
        mostrarToast(resultado === 'ok'
          ? '🏆 Tesouro enviado para a TV!'
          : `⚠️ Broadcast: ${resultado ?? 'sem resposta'}`);
      } catch (err) {
        mostrarErro(err.message);
      } finally {
        processando = false;
        btnConfirmarTesouro.disabled = false;
        btnConfirmarTesouro.textContent = 'Confirmar 🎉';
      }
    });

    // ── Realtime: mantém status do tesouro sincronizado ─────────

    subscribeConfig((config) => {
      if (config.modo_apresentacao) aplicarModoUI(config.modo_apresentacao);
      if (config.tesouro_status)    aplicarTesouroUI(config.tesouro_status);
    });

    // ── Helpers ──────────────────────────────────────────────────

    function mostrarErro(msg) {
      erroTesouro.textContent = msg;
      erroTesouro.style.display = '';
    }

    function mostrarToast(msg) {
      clearTimeout(toastTimeout);
      document.querySelector('.toast-sucesso')?.remove();
      const toast = document.createElement('div');
      toast.className = 'toast-sucesso';
      toast.textContent = msg;
      document.body.appendChild(toast);
      toastTimeout = setTimeout(() => toast.remove(), 3500);
    }

    // ── Prêmios para desafios ────────────────────────────────────

    async function carregarPremiosTv() {
      const { data } = await supabase
        .from('premios')
        .select('id, nome, codigo, categoria, imagem_url')
        .eq('status', 'disponivel')
        .order('categoria');
      premiosTv = data ?? [];
      selectPremioTv.innerHTML = '<option value="">🏅 Sem prêmio</option>';
      premiosTv.forEach((p) => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `${p.nome} (${p.categoria})`;
        selectPremioTv.appendChild(opt);
      });
    }

    selectPremioTv.addEventListener('change', () => {
      premioSelecionadoTv = premiosTv.find((p) => p.id === selectPremioTv.value) ?? null;
    });

    async function acionarPremioTv(participanteNome, premio) {
      try {
        const { data: evento, error: evErr } = await supabase
          .from('eventos')
          .insert({
            tipo: 'livre',
            premio_id: premio.id,
            premio_codigo: premio.codigo,
            premio_nome: premio.nome,
            premio_imagem_url: premio.imagem_url,
            premio_categoria: premio.categoria,
            vencedor: participanteNome,
            status: 'pending',
            metadata: { origem: 'desafio_visual' },
          })
          .select()
          .single();

        if (evErr) throw evErr;

        await supabase.from('premios').update({ status: 'reservado' }).eq('id', premio.id);

        await canalBroadcast.aguardarPronto();
        await canalBroadcast.send({
          type: 'broadcast',
          event: 'novo_evento',
          payload: evento,
        });

        mostrarToast('🏆 Prêmio enviado para a TV!');
        carregarPremiosTv();
      } catch (err) {
        mostrarToast(`⚠️ Erro ao acionar prêmio: ${err.message}`);
      }
    }

    // ── Lançar desafio rápido ─────────────────────────────────────

    btnLancarDesafio.addEventListener('click', async () => {
      const nome = inputDesafioParticipante.value.trim();
      if (!nome) { mostrarToast('⚠️ Digite o nome do participante.'); return; }
      if (desafioProcessando) return;

      desafioProcessando          = true;
      btnLancarDesafio.disabled   = true;
      btnLancarDesafio.textContent = '⏳';

      try {
        const { data: charadas, error: cErr } = await supabase
          .from('tesouro_charadas')
          .select('*')
          .eq('ativo', true)
          .neq('tipo', 'pergunta');

        if (cErr || !charadas?.length) throw new Error('Nenhum desafio disponível.');

        const charada = charadas[Math.floor(Math.random() * charadas.length)];
        charadaAtiva  = charada;

        const { data: tentativa, error: tErr } = await supabase
          .from('desafios_tentativas')
          .insert({ charada_id: charada.id, participante_nome: nome, status: 'aguardando_tv' })
          .select()
          .single();

        if (tErr) throw tErr;
        desafioAtivo = tentativa;

        // Preenche textos das alternativas
        document.getElementById('ctrl-texto-a').textContent = charada.alternativa_a;
        document.getElementById('ctrl-texto-b').textContent = charada.alternativa_b;
        document.getElementById('ctrl-texto-c').textContent = charada.alternativa_c;
        document.getElementById('ctrl-texto-d').textContent = charada.alternativa_d;

        atualizarPainelDesafio(tentativa);
        inputDesafioParticipante.value = '';
        mostrarToast('🎯 Desafio enviado para a TV!');

        // Fallback: garante que os botões apareçam após a fase visual
        const tempoVisual = charada.tipo !== 'pergunta' && charada.payload_json?.tempo_exibicao
          ? charada.payload_json.tempo_exibicao
          : 500;
        const tentativaIdLancada = tentativa.id;
        setTimeout(() => {
          if (desafioAtivo?.id === tentativaIdLancada && desafioAtivo.status === 'aguardando_tv') {
            desafioAtivo = { ...desafioAtivo, status: 'aguardando_resposta' };
            atualizarPainelDesafio(desafioAtivo);
          }
        }, tempoVisual + 2000);

      } catch (err) {
        mostrarToast(`⚠️ ${err.message}`);
      } finally {
        desafioProcessando           = false;
        btnLancarDesafio.disabled    = false;
        btnLancarDesafio.textContent = '🎯 Lançar';
      }
    });

    function atualizarPainelDesafio(tentativa) {
      desafioPainel.style.display = '';

      if (tentativa.status === 'aguardando_tv') {
        desafioStatusBloco.textContent    = `⏳ ${tentativa.participante_nome} — aguardando a TV...`;
        gradeRespostas.style.display      = 'none';

      } else if (tentativa.status === 'aguardando_resposta') {
        desafioStatusBloco.textContent = `👉 ${tentativa.participante_nome} — selecione a resposta:`;
        gradeRespostas.style.display   = '';
        habilitarRespostas(true);
        ['a','b','c','d'].forEach((l) => {
          document.getElementById(`ctrl-alt-${l}`)?.classList.remove('btn-resposta--correta','btn-resposta--incorreto');
        });

      } else if (tentativa.status === 'respondida') {
        desafioStatusBloco.textContent = tentativa.correta
          ? `🎉 ${tentativa.participante_nome} acertou!`
          : `❌ ${tentativa.participante_nome} errou.`;
        gradeRespostas.style.display = '';
        habilitarRespostas(false);
        if (tentativa.resposta) {
          const btn = document.getElementById(`ctrl-alt-${tentativa.resposta.toLowerCase()}`);
          btn?.classList.add(tentativa.correta ? 'btn-resposta--correta' : 'btn-resposta--incorreto');
        }
        setTimeout(() => {
          desafioPainel.style.display = 'none';
          desafioAtivo  = null;
          charadaAtiva  = null;
        }, 4000);
      }
    }

    function habilitarRespostas(habilitar) {
      ['a','b','c','d'].forEach((l) => {
        const btn = document.getElementById(`ctrl-alt-${l}`);
        if (btn) btn.disabled = !habilitar;
      });
    }

    document.querySelectorAll('.btn-resposta').forEach((btn) => {
      btn.addEventListener('click', async () => {
        if (!desafioAtivo || desafioAtivo.status !== 'aguardando_resposta') return;
        const letra  = btn.dataset.letra;
        const correta = letra === charadaAtiva?.resposta_correta;
        habilitarRespostas(false);

        const { error } = await supabase
          .from('desafios_tentativas')
          .update({ status: 'respondida', resposta: letra, correta })
          .eq('id', desafioAtivo.id);

        if (error) {
          habilitarRespostas(true);
          mostrarToast(`⚠️ ${error.message}`);
        } else if (correta && premioSelecionadoTv) {
          const premioParaAcionar   = premioSelecionadoTv;
          const nomeParticipante    = desafioAtivo.participante_nome;
          premioSelecionadoTv       = null;
          selectPremioTv.value      = '';
          setTimeout(() => acionarPremioTv(nomeParticipante, premioParaAcionar), 4500);
        }
      });
    });

    subscribeDesafiosTentativas((tentativa) => {
      if (!desafioAtivo || tentativa.id !== desafioAtivo.id) return;
      desafioAtivo = tentativa;
      atualizarPainelDesafio(tentativa);
    });

    // ─────────────────────────────────────────────────────────────

    carregarConfig();
    carregarPremiosTv();
  </script>
</body>
</html>
